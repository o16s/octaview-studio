name: Build Desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build-cmd: build:mac
            artifact-name: desktop-mac-arm64
            artifact-pattern: "desktop/dist/*.dmg"
          - os: macos-latest
            build-cmd: build:mac-x64
            artifact-name: desktop-mac-x64
            artifact-pattern: "desktop/dist/*.dmg"
          - os: windows-latest
            build-cmd: build:win
            artifact-name: desktop-windows
            artifact-pattern: "desktop/dist/*.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install monorepo dependencies
        run: yarn install

      - name: Build web app
        run: yarn web:build:prod

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: npm run ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-pattern }}
